on:
  push:
    branches: [main, rc, develop]
  pull_request:
    branches: [main, rc, develop]

name: TreatmentPatterns [latest]

jobs:
  TreatmentPatterns-test:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release'}
    env:
      STATUS: 0
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: 'https://OHDSI.github.io/drat'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'

      - name: Install DarwinShinyModules
        run: R CMD INSTALL --with-keep.source --no-multiarch ./

      - name: Install remotes
        run: Rscript -e 'install.packages("CirceR")'

      - name: Run test-database.R
        run: |
          Rscript -e 'testthat::test_file(
            path = "./extras/versionChecks/TreatmentPatterns-version-check.R",
            reporter = c("summary", "fail"),
            package = "DarwinShinyModules"
          )'
